---
- name: Configuration du serveur de démonstration
  hosts: demo
  become: true

  vars:
    # Secret récupéré dynamiquement depuis Vault (jamais en clair dans le code)
    demo_secret: "{{ lookup('community.hashi_vault.vault_kv2_get', 'demo', engine_mount_point='secret').secret.root_password }}"

  tasks:
    - name: Mettre à jour le cache APT
      apt:
        update_cache: yes

    - name: Installer Nginx
      apt:
        name: nginx
        state: present

    - name: Déployer une page d'accueil personnalisée
      copy:
        content: |
          <html>
            <head><title>CyberNovaTech - Démo IaC</title></head>
            <body>
              <h1>Déployé automatiquement par Ansible</h1>
              <p>Projet PRA - Infrastructure as Code</p>
              <p>Secret géré par HashiCorp Vault</p>
            </body>
          </html>
        dest: /var/www/html/index.html

    - name: Demonstration - secret tire depuis Vault
      debug:
        msg: "Le secret a bien ete recupere depuis Vault (longueur : {{ demo_secret | length }} caracteres)"

    - name: Démarrer et activer Nginx
      service:
        name: nginx
        state: started
        enabled: yes
