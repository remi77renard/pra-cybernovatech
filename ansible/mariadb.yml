---
- name: Deploiement MariaDB avec restauration et agents (zone APP)
  hosts: mariadb
  become: true

  vars:
    root_pw: "{{ lookup('community.hashi_vault.vault_kv2_get', 'mariadb', engine_mount_point='secret').secret.root_password }}"
    nc_user: "{{ lookup('community.hashi_vault.vault_kv2_get', 'mariadb', engine_mount_point='secret').secret.nextcloud_user }}"
    nc_pw: "{{ lookup('community.hashi_vault.vault_kv2_get', 'mariadb', engine_mount_point='secret').secret.nextcloud_password }}"
    nc_db: "{{ lookup('community.hashi_vault.vault_kv2_get', 'mariadb', engine_mount_point='secret').secret.nextcloud_db }}"
    nc_host: "{{ lookup('community.hashi_vault.vault_kv2_get', 'mariadb', engine_mount_point='secret').secret.nextcloud_host }}"
    wazuh_manager: "192.168.20.220"
    zabbix_server: "192.168.20.200"

  tasks:
    - name: Installer MariaDB
      apt:
        name: [mariadb-server, python3-pymysql]
        state: present
        update_cache: yes

    - name: Demarrer et activer MariaDB
      service:
        name: mariadb
        state: started
        enabled: yes

    - name: Definir le mot de passe root
      mysql_user:
        name: root
        password: "{{ root_pw }}"
        login_user: root
        login_password: "{{ root_pw }}"
        login_unix_socket: /run/mysqld/mysqld.sock
        check_implicit_admin: yes
      ignore_errors: yes

    - name: Creer la base nextcloud
      mysql_db:
        name: "{{ nc_db }}"
        state: present
        login_user: root
        login_password: "{{ root_pw }}"

    - name: Copier le dump SQL vers le conteneur
      copy:
        src: nextcloud-dump.sql
        dest: /tmp/nextcloud-dump.sql

    - name: Importer les donnees dans la base nextcloud
      mysql_db:
        name: "{{ nc_db }}"
        state: import
        target: /tmp/nextcloud-dump.sql
        login_user: root
        login_password: "{{ root_pw }}"

    - name: Creer l'utilisateur nextcloud (restreint a son IP)
      mysql_user:
        name: "{{ nc_user }}"
        password: "{{ nc_pw }}"
        host: "{{ nc_host }}"
        priv: "{{ nc_db }}.*:ALL"
        state: present
        login_user: root
        login_password: "{{ root_pw }}"

    - name: Ecouter sur le reseau (bind-address)
      lineinfile:
        path: /etc/mysql/mariadb.conf.d/50-server.cnf
        regexp: '^bind-address'
        line: 'bind-address = 0.0.0.0'
      notify: restart mariadb

    # ===== AGENT WAZUH (SIEM) =====
    - name: Telecharger l'agent Wazuh
      get_url:
        url: https://packages.wazuh.com/4.x/apt/pool/main/w/wazuh-agent/wazuh-agent_4.9.0-1_amd64.deb
        dest: /tmp/wazuh-agent.deb

    - name: Installer l'agent Wazuh
      apt:
        deb: /tmp/wazuh-agent.deb
      environment:
        WAZUH_MANAGER: "{{ wazuh_manager }}"
        WAZUH_AGENT_NAME: "mariadb"

    - name: Activer et demarrer l'agent Wazuh
      systemd:
        name: wazuh-agent
        enabled: yes
        state: started
        daemon_reload: yes

    # ===== AGENT ZABBIX (Supervision) =====
    - name: Installer gnupg (necessaire pour la cle Zabbix)
      apt:
        name: gnupg
        state: present

    - name: Telecharger la cle GPG Zabbix
      get_url:
        url: https://repo.zabbix.com/zabbix-official-repo.key
        dest: /tmp/zabbix.key

    - name: Installer la cle GPG Zabbix
      shell: gpg --dearmor < /tmp/zabbix.key > /usr/share/keyrings/zabbix.gpg

    - name: Ajouter le depot Zabbix 7.0
      copy:
        dest: /etc/apt/sources.list.d/zabbix.sources
        content: |
          Types: deb
          URIs: http://repo.zabbix.com/zabbix/7.0/ubuntu
          Suites: noble
          Components: main
          Signed-By: /usr/share/keyrings/zabbix.gpg

    - name: Installer l'agent Zabbix 2
      apt:
        name: zabbix-agent2
        state: present
        update_cache: yes

    - name: Configurer le serveur Zabbix
      lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^Server='
        line: 'Server=127.0.0.1,{{ zabbix_server }}'

    - name: Configurer le serveur actif Zabbix
      lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^ServerActive='
        line: 'ServerActive={{ zabbix_server }}'

    - name: Configurer le hostname Zabbix
      lineinfile:
        path: /etc/zabbix/zabbix_agent2.conf
        regexp: '^Hostname='
        line: 'Hostname=mariadb'
      notify: restart zabbix

  handlers:
    - name: restart mariadb
      service:
        name: mariadb
        state: restarted
    - name: restart zabbix
      service:
        name: zabbix-agent2
        state: restarted
        enabled: yes
